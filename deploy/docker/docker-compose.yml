version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - 5432:5432

  client:
    container_name: client
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "80:80"
   
  account:
    container_name: account
    build:
      context: .
      dockerfile: account/Dockerfile
    ports:
      - "80:80"   